name: Build Mesen2
on: [push, pull_request]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1
      - name: Build
        run: msbuild Mesen2.sln /p:Configuration=Release
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: Mesen2-build
          path: bin/Release
